<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16a34a">
  <title>Reps</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/theme.css">
</head>
<body>
  <header class="app-header">
    <h1 id="view-title">Today</h1>
  </header>

  <main id="view"></main>

  <nav class="tab-bar">
    <button class="tab active" data-tab="today" aria-label="Today">
      <span class="tab-icon">&#10003;</span><span class="tab-label">Today</span>
    </button>
    <button class="tab" data-tab="history" aria-label="History">
      <span class="tab-icon">&#9776;</span><span class="tab-label">History</span>
    </button>
    <button class="tab" data-tab="chart" aria-label="Chart">
      <span class="tab-icon">&#9617;</span><span class="tab-label">Chart</span>
    </button>
    <button class="tab" data-tab="settings" aria-label="Settings">
      <span class="tab-icon">&#9881;</span><span class="tab-label">Settings</span>
    </button>
  </nav>

  <div id="toast" class="toast" hidden></div>

  <script src="./js/store.js"></script>
  <script src="./js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
